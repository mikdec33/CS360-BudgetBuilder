<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Budget Wizard</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .wizard-page { display: none; }
    .wizard-page.active { display: block; }
    .nav-buttons { margin-top: 20px; }
  </style>
</head>
<body>
  <div class="budget-container">
    <h1>Welcome, Mikayla!</h1>
    <p>This is a step‑by‑step budget wizard. Fill out each section and use Next/Back to navigate.</p>

    <!-- Page 1: Overview -->
    <div class="wizard-page active" id="page0">
      <h2>Budget Overview</h2>
      <form id="overviewForm">
        <label for="adminName">Administration Name:</label>
        <input type="text" id="adminName" name="adminName" placeholder="e.g. University of Idaho" required />

        <label for="startYear">Start Year:</label>
        <input type="number" id="startYear" name="startYear" required />

        <label for="endYear">End Year:</label>
        <input type="number" id="endYear" name="endYear" required />
      </form>
      <div class="nav-buttons">
        <button id="nextBtn">Next</button>
      </div>
    </div>

    <!-- Page 2: Budget Entry -->
    <div class="wizard-page" id="page1">
      <h2>Budget Entry</h2>
      <form id="budgetForm">
        <label for="budgetCategory">Budget Category:</label>
        <select id="budgetCategory" name="budgetCategory" required>
          <option value="">-- Select Category --</option>
          <option value="Personnel">Personnel</option>
          <option value="Student Support">Student Support</option>
          <option value="Travel">Travel</option>
          <option value="Subawards">Subawards</option>
          <option value="Other">Other</option>
        </select>

        <label for="amount">Amount (USD):</label>
        <input type="number" id="amount" name="amount" min="0" step="0.01" required />

        <label for="justification">Justification:</label>
        <textarea id="justification" name="justification" rows="4" required></textarea>

        <label for="fte">Student FTE (%):</label>
        <input type="number" id="fte" name="fte" min="0" max="50" step="1" placeholder="Max 50%" />
        <div id="fteWarning" style="color: red; display: none;">Student FTE cannot exceed 50%</div>
      </form>
      <div class="nav-buttons">
        <button id="backBtn">Back</button>
        <button id="nextBtn">Next</button>
      </div>
    </div>

    <!-- Page 3: Travel -->
  <div class="wizard-page" id="page2">
    <h2>Travel</h2>
    <form id="travelForm">
      <label>Destination Type:
        <select id="destinationType">
          <option value="domestic">Domestic</option>
          <option value="international">International</option>
        </select>
      </label><br>
      <label>Duration (days): <input type="number" id="durationDays" /></label><br>
      <button type="button" id="travelCalcBtn">Calculate Travel</button>
    </form>

    <div id="travelResults"></div>

    <div class="nav-buttons">
      <button id="backBtn">Back</button>
      <button id="nextBtn">Next</button>
    </div>
  </div>


    <!-- Page 4: Review -->
  <div class="wizard-page" id="page3">
    <h2>Review & Submit</h2>
    <p>Here’s a summary of your inputs:</p>
    <div id="reviewSummary"></div>

    <div class="nav-buttons">
      <button id="backBtn">Back</button>
      <button id="submitBtn">Submit & Export</button>
    </div>
  </div>

  <script>
    // Wizard navigation
    let currentPage = 0;
    const pages = document.querySelectorAll(".wizard-page");

    function showPage(index) {
      if (index < 0 || index >= pages.length) return;
      pages[currentPage].classList.remove("active");
      currentPage = index;
      pages[currentPage].classList.add("active");
    }

    document.addEventListener("click", function(e) {
      if (e.target && e.target.id === "nextBtn") {
        showPage(currentPage + 1);
      }
      if (e.target && e.target.id === "backBtn") {
        showPage(currentPage - 1);
      }
    });

    // FTE validation
    const fteInput = document.getElementById("fte");
    fteInput?.addEventListener("input", function () {
      const fte = parseInt(fteInput.value);
      document.getElementById("fteWarning").style.display = fte > 50 ? "block" : "none";
    });

    document.getElementById("submitBtn")?.addEventListener("click", async () => {
      const fte = parseInt(document.getElementById("fte").value);
      if (fte > 50) {
        alert("Student FTE cannot exceed 50%");
        return;
      }

      const formValues = {
        adminName: document.getElementById("adminName").value,
        budgetCategory: document.getElementById("budgetCategory").value,
        amount: document.getElementById("amount").value,
        justification: document.getElementById("justification").value,
        semester: document.getElementById("semester")?.value,
        tuitionType: document.getElementById("tuitionType")?.value,
        fte: document.getElementById("fte")?.value,
        destinationType: document.getElementById("destinationType")?.value,
        durationDays: document.getElementById("durationDays")?.value,
        subInstitution: document.getElementById("subInstitution")?.value,
        subTotal: document.getElementById("subTotal")?.value,
        subRate: document.getElementById("subRate")?.value
    };

  const payload = {
    ...formValues,
    userId: localStorage.getItem("userId")
  };

  try {
    const res = await fetch("/api/budget/submit", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const result = await res.json();
    if (result.success) {
      alert("Budget submitted successfully! ID: " + result.budgetId);
      window.location.href = "dashboard.html";
    } else {
      alert("Submission failed. Please try again.");
    }
  } catch (err) {
    console.error("Error submitting budget:", err);
    alert("Submission failed. Please try again.");
  }
});

  </script>
</body>
</html>
