<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Budget Template</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="budget-container">
    <h1>Welcome, Mikayla!</h1>
    <p>Please fill out the form below to begin a budget entry.</p>

    <form id="budgetForm">
      <label for="adminName">Administration Name:</label>
      <input type="text" id="adminName" name="adminName" placeholder="e.g. University of Idaho" required />

      <label for="budgetCategory">Budget Category:</label>
      <select id="budgetCategory" name="budgetCategory" required>
        <option value="">-- Select Category --</option>
        <option value="Personnel">Personnel</option>
        <option value="Student Support">Student Support</option>
        <option value="Travel">Travel</option>
        <option value="Subawards">Subawards</option>
        <option value="Other">Other</option>
      </select>

      <label for="amount">Amount (USD):</label>
      <input type="number" id="amount" name="amount" min="0" step="0.01" required />

      <label for="justification">Justification:</label>
      <textarea id="justification" name="justification" rows="4" placeholder="Explain why this expense is necessary..." required></textarea>

      <label for="fte">Student FTE (%):</label>
      <input type="number" id="fte" name="fte" min="0" max="50" step="1" placeholder="Max 50%" />

      <div id="fteWarning" style="color: red; display: none;">Student FTE cannot exceed 50%</div>

      <button type="submit">Submit Budget</button>
    </form>

    <div id="confirmationMessage"></div>
  </div>

  <script>
    const fteInput = document.getElementById("fte");
    fteInput.addEventListener("input", function () {
      const fte = parseInt(fteInput.value);
      document.getElementById("fteWarning").style.display = fte > 50 ? "block" : "none";
    });

    document.getElementById("budgetForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const fte = parseInt(document.getElementById("fte").value);
      if (fte > 50) {
        alert("Student FTE cannot exceed 50%");
        return;
      }

      const adminName = document.getElementById("adminName").value;
      const category = document.getElementById("budgetCategory").value;
      const amount = document.getElementById("amount").value;
      const justification = document.getElementById("justification").value;

      localStorage.setItem("adminName", adminName);
      localStorage.setItem("budgetCategory", category);
      localStorage.setItem("amount", amount);
      localStorage.setItem("justification", justification);

      window.location.href = "budgetTemplate.html";
    });
  </script>
</body>
</html>
